<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    /* 自訂捲軸樣式 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f7ff',
              100: '#e0effe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 transition-colors duration-300 min-h-screen pb-16">

  <!-- 頂部導覽列 -->
  <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <span class="text-2xl">🚀</span>
        <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent tracking-wide">
          AI Prompt
        </h1>
      </div>
      <div class="flex items-center space-x-4">
        <a id="sheetLink" href="https://docs.google.com/spreadsheets/d/1jYFI-x8kQCLsPrkLOr01nv-MoFFInJpUPjJ5oLYnaqk/edit?usp=sharing" target="_blank" class="text-sm font-medium text-slate-400 hover:text-blue-400 flex items-center gap-1 transition-colors">
          <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
          <span class="hidden sm:inline">開啟原始資料 Google Sheet</span>
        </a>
        <button id="themeToggle" class="p-2 rounded-lg bg-slate-900 hover:bg-slate-800 transition-colors" title="切換深淺模式">
          <i data-lucide="sun" class="w-5 h-5 text-amber-400"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 主體容器 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    
    <!-- 搜尋與核心操作區 -->
    <div class="text-center mb-8">
      <div class="max-w-2xl mx-auto relative mb-6">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i data-lucide="search" class="h-5 w-5 text-slate-500"></i>
        </div>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="搜尋提示詞標題、內容或分類..." 
          class="block w-full pl-11 pr-12 py-3.5 sm:py-4 bg-slate-900 border border-slate-800 rounded-2xl shadow-xl placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base transition-all text-white"
        >
        <button id="clearSearch" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-slate-300 hidden">
          <i data-lucide="x" class="h-5 w-5"></i>
        </button>
      </div>

      <!-- 分類標籤區 -->
      <div class="flex flex-wrap justify-center gap-2 max-w-4xl mx-auto mb-8" id="categoryContainer">
        <!-- 分類標籤由 JS 動態生成 -->
        <div class="animate-pulse flex space-x-2">
          <div class="h-8 w-16 bg-slate-800 rounded-full"></div>
          <div class="h-8 w-24 bg-slate-800 rounded-full"></div>
          <div class="h-8 w-20 bg-slate-800 rounded-full"></div>
        </div>
      </div>
    </div>

    <!-- 區塊標題與工具 -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-900 pb-4 mb-6">
      <div class="flex items-center space-x-2">
        <span class="text-2xl">🧠</span>
        <h2 class="text-2xl font-bold text-white">AI 協思</h2>
        <span id="cardCount" class="text-sm bg-blue-905/30 text-blue-300 border border-blue-900/50 px-2.5 py-0.5 rounded-full font-medium ml-2">載入中...</span>
      </div>
      
      <div class="flex items-center space-x-3 mt-4 sm:mt-0">
        <!-- 新增自訂按鈕 -->
        <button id="openAddModal" class="flex items-center gap-1.5 px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl text-sm font-medium shadow-md hover:shadow-lg transition-all">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>新增 Prompt</span>
        </button>
        <!-- 重新載入按鈕 -->
        <button id="reloadBtn" class="flex items-center gap-1.5 px-3 py-2 bg-slate-900 text-slate-200 border border-slate-800 hover:bg-slate-850 rounded-xl text-sm font-medium transition-all" title="重新從 Google Sheet 同步">
          <i data-lucide="refresh-cw" class="w-4 h-4" id="reloadIcon"></i>
          <span class="hidden sm:inline">重新同步</span>
        </button>
      </div>
    </div>

    <!-- 骨架屏載入動畫 -->
    <div id="skeletonGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- 4 個骨架卡片 -->
      <div class="bg-slate-900 rounded-2xl p-6 border border-slate-850 shadow-sm space-y-4 animate-pulse">
        <div class="h-4 bg-slate-800 rounded w-1/3"></div>
        <div class="h-6 bg-slate-800 rounded w-3/4"></div>
        <div class="space-y-2">
          <div class="h-4 bg-slate-800 rounded"></div>
          <div class="h-4 bg-slate-800 rounded"></div>
          <div class="h-4 bg-slate-800 rounded w-5/6"></div>
        </div>
        <div class="h-10 bg-slate-800 rounded-xl w-full"></div>
      </div>
      <div class="bg-slate-900 rounded-2xl p-6 border border-slate-850 shadow-sm space-y-4 animate-pulse">
        <div class="h-4 bg-slate-800 rounded w-1/3"></div>
        <div class="h-6 bg-slate-800 rounded w-3/4"></div>
        <div class="space-y-2">
          <div class="h-4 bg-slate-800 rounded"></div>
          <div class="h-4 bg-slate-800 rounded"></div>
          <div class="h-4 bg-slate-800 rounded w-5/6"></div>
        </div>
        <div class="h-10 bg-slate-800 rounded-xl w-full"></div>
      </div>
      <div class="bg-slate-900 rounded-2xl p-6 border border-slate-850 shadow-sm space-y-4 animate-pulse col-span-1 md:hidden lg:block">
        <div class="h-4 bg-slate-800 rounded w-1/3"></div>
        <div class="h-6 bg-slate-800 rounded w-3/4"></div>
        <div class="space-y-2">
          <div class="h-4 bg-slate-800 rounded"></div>
          <div class="h-4 bg-slate-800 rounded"></div>
          <div class="h-4 bg-slate-800 rounded w-5/6"></div>
        </div>
        <div class="h-10 bg-slate-800 rounded-xl w-full"></div>
      </div>
    </div>

    <!-- 卡片展示網格 -->
    <div id="promptsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
      <!-- JS 動態渲染卡片 -->
    </div>

    <!-- 無搜尋結果提示 -->
    <div id="noResults" class="hidden flex flex-col items-center justify-center py-20 text-center">
      <div class="bg-slate-900 p-4 rounded-full text-slate-500 mb-4 border border-slate-850">
        <i data-lucide="search-code" class="w-12 h-12"></i>
      </div>
      <h3 class="text-lg font-medium text-white">找不到任何提示詞</h3>
      <p class="text-slate-400 mt-1 max-w-md">試試看更換關鍵字或選擇其他分類標籤。</p>
    </div>

  </main>

  <!-- 浮動 Toast 提示框 -->
  <div id="toast" class="fixed bottom-5 right-5 sm:bottom-8 sm:right-8 z-50 transform translate-y-12 opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-3 bg-white text-slate-950 px-5 py-3.5 rounded-2xl shadow-2xl border border-slate-200">
    <div class="bg-green-500 text-white rounded-full p-1 flex items-center justify-center">
      <i data-lucide="check" class="w-4 h-4"></i>
    </div>
    <div>
      <p class="text-sm font-semibold">複製成功！</p>
      <p class="text-xs text-slate-500 mt-0.5">Prompt 已成功複製至您的剪貼簿</p>
    </div>
  </div>

  <!-- 新增 Prompt 燈箱彈窗 (Modal) -->
  <div id="addModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/75 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-slate-900 w-full max-w-lg rounded-2xl shadow-2xl border border-slate-800 transform scale-95 transition-all duration-300 overflow-hidden">
      <!-- 彈窗頂部 -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-800">
        <h3 class="text-lg font-bold text-white flex items-center gap-2">
          <i data-lucide="sparkles" class="w-5 h-5 text-blue-400"></i>
          新增自訂 Prompt
        </h3>
        <button id="closeAddModal" class="text-slate-400 hover:text-white">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
      <!-- 彈窗內容 -->
      <form id="addPromptForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">分類標籤</label>
          <input 
            type="text" 
            id="modalCategory" 
            placeholder="例如：內容創作、程式設計、筆記精煉" 
            required
            class="block w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">標題 / 功能</label>
          <input 
            type="text" 
            id="modalTitle" 
            placeholder="例如：意義單詞、書籍重點提取" 
            required
            class="block w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">提示詞內容 (Prompt)</label>
          <textarea 
            id="modalPrompt" 
            rows="5" 
            placeholder="在此輸入完整的 AI 提示詞..." 
            required
            class="block w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 custom-scrollbar resize-none text-white"
          ></textarea>
        </div>
        <div class="flex justify-end space-x-3 pt-2">
          <button type="button" id="cancelAddModal" class="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-200 rounded-xl text-sm font-medium transition-colors">
            取消
          </button>
          <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium transition-colors shadow-md shadow-blue-500/10">
            加入庫中
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 預載備用資料 (來源於圖片中呈現的完美提示詞)
    const fallbackPrompts = [
      {
        category: "內容創作",
        title: "意義單詞",
        prompt: "將文章的重點部分，尋找一個代表性英文字母，並使這些字母的首字組合成一個具有意義的單詞（如「VISION」）。"
      },
      {
        category: "內容創作",
        title: "品牌名稱",
        prompt: "完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想 5 個產品名稱與標題（口號）。\n\n- 提示詞指令：描述品牌與產品，請列出數字、個產品名稱與行銷標題建議。(*品牌定義*描述、*產品介紹*描述)\n\n- Prompt: 我推出一個運動鞋品牌，今年會銷售一款新型跑步..."
      },
      {
        category: "筆記精煉",
        title: "長篇文章",
        prompt: "為這一篇長篇文章，進行以下四個步驟，每一個步驟都要提供給文章與標示出來：\n第1、請為這篇長文生成一份簡短摘要。\n第2、請基於上一個摘要，不要遺漏任何專有名詞、數字或關鍵人物，重新生成一份摘要。\n第3、現在，請將摘要中每一句話都濃縮成更簡潔的表達，同時保留..."
      },
      {
        category: "筆記精煉",
        title: "書籍精煉",
        prompt: "請對 @[檔名] 啟動【終極煉金管線】，一次執行四步驟整合：\n第一步：全域架構導航 (Stage 01) 執行 stage-1-navigator，對精煉稿進行深度掃描，產出知識地圖與反直覺預警。\n存檔：01_Map_[主題簡稱].md。\n第二步：價值 DNA 診斷 (Stage 02)"
      },
      {
        category: "筆記精煉",
        title: "提取練習",
        prompt: "我剛讀完了關於 [填入具體段落標題] 的內容。現在請幫我進行深度研磨：\n\n1-底層邏輯拷問：針對這段內容的「運作原理」向我提問，測試我是否理解了「為什麼有效」，而非只是記住步驟。\n\n2-環境轉化：如果這段概念有複..."
      },
      {
        category: "內容創作",
        title: "影片清理",
        prompt: "你的角色是一位「逐字稿校對員」，不是編輯。\n任務：\n1-僅刪除口語填充詞、重複說法、明顯冗詞\n2-不得改寫句型、不得改變原意、不得加入新解釋\n規則：\n1-原句順序必須完全一致\n2-若刪除任何詞語，需確保前後銜..."
      },
      {
        category: "內容創作",
        title: "影片清理",
        prompt: "你的角色是一位「內容結構化整理員」，不是編輯、不是評論者。\n\n我會提供一段約 4000 字的影片文字內容，請你在完全保留原作者語意與立場的前提下，進行「保留語意的濃縮」，將內容壓縮至 約 2000 字。全文用繁體中文呈現。"
      }
    ];

    let allPrompts = [];
    let selectedCategory = "全部";

    // 初始化與 DOM 元素
    const themeToggle = document.getElementById('themeToggle');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const categoryContainer = document.getElementById('categoryContainer');
    const promptsGrid = document.getElementById('promptsGrid');
    const skeletonGrid = document.getElementById('skeletonGrid');
    const noResults = document.getElementById('noResults');
    const cardCount = document.getElementById('cardCount');
    const reloadBtn = document.getElementById('reloadBtn');
    const reloadIcon = document.getElementById('reloadIcon');
    
    // Modal 元素
    const addModal = document.getElementById('addModal');
    const openAddModal = document.getElementById('openAddModal');
    const closeAddModal = document.getElementById('closeAddModal');
    const cancelAddModal = document.getElementById('cancelAddModal');
    const addPromptForm = document.getElementById('addPromptForm');

    // 深色模式初始化
    if (localStorage.getItem('color-theme') === 'light') {
      document.documentElement.classList.remove('dark');
      themeToggle.innerHTML = '<i data-lucide="moon" class="w-5 h-5 text-slate-400"></i>';
    } else {
      document.documentElement.classList.add('dark');
      localStorage.setItem('color-theme', 'dark');
      themeToggle.innerHTML = '<i data-lucide="sun" class="w-5 h-5 text-amber-400"></i>';
    }

    themeToggle.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('color-theme', 'light');
        themeToggle.innerHTML = '<i data-lucide="moon" class="w-5 h-5 text-slate-600"></i>';
        document.body.className = "bg-slate-50 text-slate-800 transition-colors duration-300 min-h-screen pb-16";
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('color-theme', 'dark');
        themeToggle.innerHTML = '<i data-lucide="sun" class="w-5 h-5 text-amber-400"></i>';
        document.body.className = "bg-slate-950 text-slate-100 transition-colors duration-300 min-h-screen pb-16";
      }
      renderCategories();
      renderCards();
      lucide.createIcons();
    });

    // 取得 Google Sheet 資料
    async function loadData() {
      showLoading(true);
      const sheetId = '1jYFI-x8kQCLsPrkLOr01nv-MoFFInJpUPjJ5oLYnaqk';
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('網路回應不成功');
        const text = await response.text();
        
        // 提取 JSON 字串
        const startIdx = text.indexOf('{');
        const endIdx = text.lastIndexOf('}') + 1;
        const jsonStr = text.substring(startIdx, endIdx);
        const data = JSON.parse(jsonStr);

        const rows = data.table.rows;
        const cols = data.table.cols;

        // 智慧尋找對應欄位 (分類、標題、內容)
        let catIdx = 0;
        let titleIdx = 1;
        let promptIdx = 2;

        cols.forEach((col, idx) => {
          if (col.label) {
            const label = col.label.toLowerCase();
            if (label.includes('分類') || label.includes('category') || label.includes('tag') || label.includes('組別')) {
              catIdx = idx;
            } else if (label.includes('名稱') || label.includes('標題') || label.includes('title') || label.includes('name')) {
              titleIdx = idx;
            } else if (label.includes('提示詞') || label.includes('prompt') || label.includes('內容') || label.includes('content') || label.includes('說明')) {
              promptIdx = idx;
            }
          }
        });

        // 解析資料
        const parsedData = rows.map(row => {
          const cells = row.c || [];
          return {
            category: cells[catIdx]?.v || cells[catIdx]?.f || '未分類',
            title: cells[titleIdx]?.v || cells[titleIdx]?.f || '無標題',
            prompt: cells[promptIdx]?.v || cells[promptIdx]?.f || ''
          };
        }).filter(item => item.title !== '無標題' && item.prompt !== '');

        if (parsedData.length > 0) {
          allPrompts = parsedData;
        } else {
          allPrompts = fallbackPrompts;
        }
      } catch (error) {
        console.warn('Google Sheet 讀取失敗，使用內建極致備用資料：', error);
        allPrompts = fallbackPrompts;
      } finally {
        showLoading(false);
        renderCategories();
        renderCards();
      }
    }

    function showLoading(isLoading) {
      if (isLoading) {
        skeletonGrid.classList.remove('hidden');
        promptsGrid.classList.add('hidden');
        reloadIcon.classList.add('animate-spin');
        cardCount.innerText = "載入中...";
      } else {
        skeletonGrid.classList.add('hidden');
        promptsGrid.classList.remove('hidden');
        reloadIcon.classList.remove('animate-spin');
      }
    }

    // 渲染分類篩選標籤
    function renderCategories() {
      // 獲取所有不重複分類
      const categories = ["全部", ...new Set(allPrompts.map(item => item.category).filter(Boolean))];
      
      categoryContainer.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat;
        
        const isActive = selectedCategory === cat;
        btn.className = `px-4 py-2 text-sm rounded-full font-medium transition-all duration-200 border ${
          isActive 
            ? 'bg-blue-600 text-white border-blue-600 shadow-lg shadow-blue-500/25 scale-105' 
            : 'bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-750 hover:text-slate-800 dark:hover:text-white'
        }`;

        btn.addEventListener('click', () => {
          selectedCategory = cat;
          renderCategories();
          renderCards();
        });

        categoryContainer.appendChild(btn);
      });
    }

    // 依分類獲取對應的配色 (精緻視覺設計)
    function getCategoryStyle(category) {
      const colors = {
        "內容創作": { bg: "bg-blue-50 dark:bg-blue-950/40", text: "text-blue-600 dark:text-blue-400", border: "border-blue-500" },
        "筆記精煉": { bg: "bg-purple-50 dark:bg-purple-950/40", text: "text-purple-600 dark:text-purple-400", border: "border-purple-500" },
        "程式應用": { bg: "bg-emerald-50 dark:bg-emerald-950/40", text: "text-emerald-600 dark:text-emerald-400", border: "border-emerald-500" },
        "簡報表達": { bg: "bg-amber-50 dark:bg-amber-950/40", text: "text-amber-600 dark:text-amber-400", border: "border-amber-500" },
        "程式生成": { bg: "bg-cyan-50 dark:bg-cyan-950/40", text: "text-cyan-600 dark:text-cyan-400", border: "border-cyan-500" },
        "文本優化": { bg: "bg-rose-50 dark:bg-rose-950/40", text: "text-rose-600 dark:text-rose-400", border: "border-rose-500" }
      };
      return colors[category] || { bg: "bg-slate-50 dark:bg-slate-900/60", text: "text-slate-600 dark:text-slate-400", border: "border-slate-700" };
    }

    // 渲染卡片
    function renderCards() {
      const searchQuery = searchInput.value.toLowerCase().trim();
      
      // 篩選
      const filtered = allPrompts.filter(item => {
        const matchesCategory = selectedCategory === "全部" || item.category === selectedCategory;
        const matchesSearch = item.title.toLowerCase().includes(searchQuery) || 
                              item.prompt.toLowerCase().includes(searchQuery) ||
                              item.category.toLowerCase().includes(searchQuery);
        return matchesCategory && matchesSearch;
      });

      cardCount.innerText = `${filtered.length} 個項目`;

      if (filtered.length === 0) {
        promptsGrid.classList.add('hidden');
        noResults.classList.remove('hidden');
        return;
      }

      noResults.classList.add('hidden');
      promptsGrid.classList.remove('hidden');
      promptsGrid.innerHTML = '';

      filtered.forEach(item => {
        const style = getCategoryStyle(item.category);
        const card = document.createElement('div');
        
        // 卡片整體結構，包含圖中紫色/藍色上邊框與圓角
        card.className = `group bg-white dark:bg-slate-900 rounded-2xl border-t-4 ${style.border} border-x border-b border-slate-150 dark:border-slate-800/80 shadow-md hover:shadow-2xl hover:shadow-blue-500/5 hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between overflow-hidden`;
        
        // 處理提示詞中的換行
        const formattedPrompt = item.prompt.replace(/\n/g, '<br>');

        card.innerHTML = `
          <div class="p-5 flex-1 flex flex-col">
            <!-- 分類標籤 -->
            <div class="mb-3">
              <span class="inline-block text-xs font-semibold px-2.5 py-1 rounded-full ${style.bg} ${style.text}">
                ${item.category}
              </span>
            </div>
            <!-- 標題 -->
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-3 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
              ${item.title}
            </h3>
            <!-- 提示詞文字視窗 (高度固定，內容過長自動呈現精緻滾動) -->
            <div class="flex-1 bg-slate-50 dark:bg-slate-950/60 rounded-xl p-3 text-sm text-slate-600 dark:text-slate-300 border border-slate-100 dark:border-slate-850 h-44 overflow-y-auto custom-scrollbar select-all leading-relaxed">
              ${formattedPrompt}
            </div>
          </div>
          <!-- 複製按鈕區 -->
          <div class="px-5 pb-5 pt-1">
            <button class="copy-btn w-full py-2.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium rounded-xl text-sm transition-all duration-150 flex items-center justify-center gap-1.5 shadow-md shadow-blue-500/10 hover:shadow-lg hover:shadow-blue-500/20">
              <i data-lucide="copy" class="w-4 h-4"></i>
              <span>複製 Prompt</span>
            </button>
          </div>
        `;

        // 綁定複製事件
        const copyBtn = card.querySelector('.copy-btn');
        copyBtn.addEventListener('click', () => {
          copyToClipboard(item.prompt, copyBtn);
        });

        promptsGrid.appendChild(card);
      });

      // 重新渲染新插入的圖示
      lucide.createIcons();
    }

    // 複製功能實作
    function copyToClipboard(text, buttonElement) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      document.body.appendChild(textarea);
      textarea.select();
      
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          showToast();
          // 按鈕動畫回饋
          const originalContent = buttonElement.innerHTML;
          buttonElement.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i><span>已複製！</span>`;
          buttonElement.classList.remove('bg-blue-600', 'hover:bg-blue-700');
          buttonElement.classList.add('bg-green-600', 'hover:bg-green-700');
          lucide.createIcons();

          setTimeout(() => {
            buttonElement.innerHTML = originalContent;
            buttonElement.classList.remove('bg-green-600', 'hover:bg-green-700');
            buttonElement.classList.add('bg-blue-600', 'hover:bg-blue-700');
            lucide.createIcons();
          }, 2000);
        }
      } catch (err) {
        console.error('複製失敗：', err);
      } finally {
        document.body.removeChild(textarea);
      }
    }

    // 顯示 Toast 提示
    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.remove('translate-y-12', 'opacity-0', 'pointer-events-none');
      toast.classList.add('translate-y-0', 'opacity-100');

      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-12', 'opacity-0', 'pointer-events-none');
      }, 2500);
    }

    // 搜尋即時過濾
    searchInput.addEventListener('input', () => {
      if (searchInput.value.trim() !== "") {
        clearSearch.classList.remove('hidden');
      } else {
        clearSearch.classList.add('hidden');
      }
      renderCards();
    });

    // 清除搜尋按鈕
    clearSearch.addEventListener('click', () => {
      searchInput.value = "";
      clearSearch.classList.add('hidden');
      renderCards();
      searchInput.focus();
    });

    // 點擊重新載入按鈕
    reloadBtn.addEventListener('click', () => {
      loadData();
    });

    // --- Modal 燈箱控制 ---
    function toggleModal(show) {
      if (show) {
        addModal.classList.remove('opacity-0', 'pointer-events-none');
        addModal.querySelector('div').classList.remove('scale-95');
        addModal.querySelector('div').classList.add('scale-100');
      } else {
        addModal.classList.add('opacity-0', 'pointer-events-none');
        addModal.querySelector('div').classList.remove('scale-100');
        addModal.querySelector('div').classList.add('scale-95');
        addPromptForm.reset();
      }
    }

    openAddModal.addEventListener('click', () => toggleModal(true));
    closeAddModal.addEventListener('click', () => toggleModal(false));
    cancelAddModal.addEventListener('click', () => toggleModal(false));
    
    // 點擊 Modal 背景處關閉
    addModal.addEventListener('click', (e) => {
      if (e.target === addModal) toggleModal(false);
    });

    // 提交自訂 Prompt
    addPromptForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const newPrompt = {
        category: document.getElementById('modalCategory').value.trim(),
        title: document.getElementById('modalTitle').value.trim(),
        prompt: document.getElementById('modalPrompt').value.trim()
      };

      allPrompts.unshift(newPrompt);
      
      renderCategories();
      renderCards();
      toggleModal(false);

      // 回饋提示
      const toastEl = document.getElementById('toast');
      const originalToast = toastEl.innerHTML;
      toastEl.querySelector('p').innerText = "新增成功！";
      toastEl.querySelectorAll('p')[1].innerText = "新 Prompt 已成功加入智慧庫";
      showToast();
      setTimeout(() => {
        toastEl.innerHTML = originalToast;
      }, 2600);
    });

    // 初始化載入
    window.addEventListener('DOMContentLoaded', () => {
      loadData();
      lucide.createIcons();
    });
  </script>
</body>
</html>
